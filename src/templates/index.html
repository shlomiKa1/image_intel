<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- תיקון: היה initial-width=1.0 במקום initial-scale=1.0 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Intel - מודיעין חזותי</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --border-color: #475569;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--container-bg);
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 550px;
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.8em;
            margin-bottom: 10px;
            margin-top: 0;
            letter-spacing: 2px;
        }

        p {
            color: #94a3b8;
            font-size: 1.1em;
            margin-bottom: 40px;
        }

        .file-drop-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 50px 20px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.02);
            cursor: pointer;
        }

        .file-drop-area:hover, .file-drop-area.dragover {
            border-color: var(--accent-color);
            background-color: rgba(56, 189, 248, 0.08);
        }

        .file-msg {
            font-size: 1.2em;
            color: #cbd5e1;
            display: block;
            margin-bottom: 10px;
        }

        .file-msg-sub {
            font-size: 0.9em;
            color: #64748b;
        }

        input[type="file"] {
            display: none;
        }

        .submit-btn {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
            color: white;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4);
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            align-items: -flex-end;
            text-align: right;
            gap: 10px;
            margin-bottom: 20px;
        }

        .radio-label {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-color);
            font-size: 1em;
        }

        .radio-label input[type="radio"] {
            display: inline;
            accent-color: var(--accent-color);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
    </style>

</head>
<body>
    <div class="container">
        <h1>Image Intel</h1>
        <p>מערכת סריקה וניתוח נתוני EXIF</p>

        <form action="/analyze" method="POST" enctype="multipart/form-data">
             <!-- כפתורי radio -->
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="mode" value="files" checked onchange="setMode('files')">
                    העלאת תמונות
                </label>
                <label class="radio-label">
                    <input type="radio" name="mode" value="folder" onchange="setMode('folder')">
                    העלאת תיקיות
                </label>
            </div>
            <div class="file-drop-area" id="drop-area">
                <span class="file-msg" id="file-msg">לחץ כאן או גרור תמונות לכאן</span>
                <span class="file-msg-sub" id="file-msg-sub">אפשר לבחור כמה תמונות יחד</span>
                <input type="file" name="photos" id="file-input" multiple accept="image/*">
                <input type="file" name="photos" id="folder-input" multiple webkitdirectory="image/*">
            </div>

            <button type="submit" class="submit-btn">התחל ניתוח מודיעיני</button>
        </form>
    </div>

    <script>
    let currentMode = 'files';

    function setMode(mode) {
        currentMode = mode;
        if (mode === 'files') {
            fileMsg.textContent = "לחץ כאן או גרור תמונות לכאן";
            fileMsgSub.textContent = "אפשר לבחור כמה תמונות יחד";
        } else {
            fileMsg.textContent = "לחץ כאן או גרור תיקיות לכאן";
            fileMsgSub.textContent = "אפשר לבחור כמה תיקיות יחד";
        }
        fileMsg.style.color = "#cbd5e1";
    }

    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    const folderInput = document.getElementById('folder-input');
    const fileMsg = document.getElementById('file-msg');
    const fileMsgSub = document.getElementById('file-msg-sub');
    const filesMap = new Map();

    // לחיצה על קובייה לפי מצב
    dropArea.addEventListener('click', () => {
        if (currentMode === 'files') {
            fileInput.click();
        } else {
            folderInput.click();
        }
    });

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.add('dragover'), false);
    });
    ['dragleave', 'drop'].forEach(eventName => {
        dropArea.addEventListener(eventName, () => dropArea.classList.remove('dragover'), false);
    });

    // גרירה — זיהוי אוטומטי
    dropArea.addEventListener('drop', (e) => {
        const items = [...e.dataTransfer.items];
        let hasDirectory = false;
        for (const item of items) {
            const entry = item.webkitGetAsEntry();
            if (entry && entry.isDirectory) {
                hasDirectory = true;
                readDirectory(entry);
            }
        }
        if (!hasDirectory) {
            addFilesToList(e.dataTransfer.files);
        }
    });

    function readDirectory(dirEntry) {
        const reader = dirEntry.createReader();
        reader.readEntries((entries) => {
            entries.forEach((entry) => {
                if (entry.isFile) {
                    entry.file((file) => {
                        filesMap.set(file.name, file);
                        const dt = new DataTransfer();
                        filesMap.forEach(f => dt.items.add(f));
                        fileInput.files = dt.files;
                        updateFileName();
                    });
                }
            });
        });
    }

    function addFilesToList(newFiles) {
        for (let i = 0; i < newFiles.length; i++) {
            filesMap.set(newFiles[i].name, newFiles[i]);
        }
        const dt = new DataTransfer();
        filesMap.forEach(f => dt.items.add(f));
        fileInput.files = dt.files;
        updateFileName();
    }

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) addFilesToList(e.target.files);
    });

    folderInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) addFilesToList(e.target.files);
    });

    function updateFileName() {
        const totalFiles = fileInput.files.length;
        if (totalFiles > 0) {
            fileMsg.textContent = "נצברו " + totalFiles + " פריטים";
            fileMsg.style.color = "var(--accent-color)";
            fileMsgSub.textContent = "אפשר להמשיך להוסיף, פריטים זהים הוחלפו אוטומטית";
        } else {
            if (currentMode === 'files') {
                fileMsg.textContent = "לחץ כאן או גרור תמונות לכאן";
                fileMsgSub.textContent = "אפשר לבחור כמה תמונות יחד";
            } else {
                fileMsg.textContent = "לחץ כאן או גרור תיקיות לכאן";
                fileMsgSub.textContent = "אפשר לבחור כמה תיקיות יחד";
            }
            fileMsg.style.color = "#cbd5e1";
        }
    }
    </script>
</body>
</html>
